name: "Dev: Apply infra - SSH - git pull - write BACKEND_ENV"

on:
  push:
    branches: [master]
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: 01-infra-dev
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get EC2 IP
        working-directory: 01-infra-dev
        id: tf-output
        run: |
          echo "elastic_ip=$(terraform output -raw elastic_ip)" >> $GITHUB_OUTPUT

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ steps.tf-output.outputs.elastic_ip }} >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          ssh -i ~/.ssh/ec2_key ec2-user@${{ steps.tf-output.outputs.elastic_ip }} bash << 'EOF'
            set -e
            cd ~/app
            git pull origin master
            cd 03-dev
            cat > backend.env << 'ENVEOF'
          $BACKEND_ENV
          ENVEOF
            docker compose pull
            docker compose up -d
          EOF