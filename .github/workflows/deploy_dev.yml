name: "Dev: Apply infra - SSH - git pull - write BACKEND_ENV"

on:
  push:
    branches: [master]
  workflow_call:
  
  workflow_dispatch:
    

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Check secret is set
        run: |
          if [ -z "${{ secrets.AWS_INFRA_REGION }}" ]; then
            echo "AWS_INFRA_REGION is empty or not set"
          else
            echo "AWS_INFRA_REGION is set (length: ${#AWS_INFRA_REGION})"
          fi
        env:
          AWS_INFRA_REGION: ${{ secrets.AWS_INFRA_REGION }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_INFRA_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_INFRA_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_INFRA_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply
        working-directory: 01-infra-dev
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get EC2 IP
        working-directory: 01-infra-dev
        id: tf-output
        run: |
          echo "elastic_ip=$(terraform output -raw elastic_ip)" >> $GITHUB_OUTPUT

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ steps.tf-output.outputs.elastic_ip }} >> ~/.ssh/known_hosts

      - name: Wait for EC2 provisioning to complete
        run: |
          for i in $(seq 1 24); do
            if ssh -i ~/.ssh/ec2_key \
                  -o StrictHostKeyChecking=no \
                  -o ConnectTimeout=5 \
                  ec2-user@${{ steps.tf-output.outputs.elastic_ip }} \
                  "test -f /var/log/bootstrap-complete"; then
              echo "Provisioning complete"
              exit 0
            fi
            echo "Attempt $i/24 — not ready, retrying in 15s..."
            sleep 15
          done
          echo "Timed out waiting for provisioning"
          exit 1


      - name: Deploy on EC2
        env:
          BACKEND_ENV: ${{ secrets.BACKEND_ENV_FILE }}
        run: |
          ssh -i ~/.ssh/ec2_key ec2-user@${{ steps.tf-output.outputs.elastic_ip }} bash << 'EOF'
            set -e
            cd ~/app
            git pull origin master
            cd 03-dev
            cat > backend.env << 'ENVEOF'
          $BACKEND_ENV
          ENVEOF
            docker compose pull
            docker compose up -d
          EOF